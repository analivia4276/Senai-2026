<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Eventos</title>
</head>

<body>

<h1>Eventos</h1>

<button onclick="abrirModal()">Novo Evento</button>

<ul id="lista"></ul>

<!-- MODAL -->
<div id="modal" style="display:none;">
  <h3>Novo Evento</h3>

  <input id="titulo" placeholder="Nome"><br><br>
  <input id="descricao" placeholder="Descrição"><br><br>
  <input id="data" type="datetime-local"><br><br>
  <input id="local" placeholder="Local"><br><br>
  <input id="capacidade" type="number" placeholder="Capacidade"><br><br>

  <button onclick="criarEvento()">Salvar</button>
  <button onclick="fecharModal()">Cancelar</button>
</div>

<script src="script.js"></script>

</body>
</html>

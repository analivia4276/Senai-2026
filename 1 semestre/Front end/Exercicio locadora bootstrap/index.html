<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:linear-gradient(135deg,#141e30,#243b55);">
    <nav class="navbar" style="background-color:#111;">
        <div class="container">
            <a class="navbar-brand text-white" href="#">Locadora de Filmes</a>
        </div>
    </nav>
<header class="text-white text-center py-5 mb-4" style="background:#111;">
    <div class="container">
        <h1 class="fw-light">Cadastro de Filmes</h1>
        <button class="btn mt-3 text-white" style="background-color:#ff3c3c;"data-bs-toggle="modal" data-bs-target="#modal">
            + Novo Filme
        </button>
    </div>
</header>
    <div class="container mb-3">
        <input type="text" id="filtroGenero" class="form-control" placeholder="Filtrar por gênero" onkeyup="filtrarGenero()">
    </div>
    <div class="container">
        <table class="table table-striped table-hover text-center">
            <thead style="background:#ff3c3c; color:white;">
                <tr>
                    <th>Capa</th>
                    <th>Nome</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                    <th>Classificação</th>
                    <th>Produtora</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="dados"></tbody>
        </table>
    </div>
    <div class="modal fade" id="modal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Filme</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="capa" class="form-control mb-2" placeholder="URL da capa">
                    <input type="text" id="nome" class="form-control mb-2" placeholder="Nome do filme">
                    <input type="text" id="genero" class="form-control mb-2" placeholder="Gênero">
                    <input type="number" id="ano" class="form-control mb-2" placeholder="Ano">
                    <input type="text" id="classificacao" class="form-control mb-2" placeholder="Classificação">
                    <input type="text" id="produtora" class="form-control mb-2" placeholder="Produtora">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarFilme()">Salvar</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

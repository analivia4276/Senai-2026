<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lojinha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"> <!-- Barra de Navegação -->
        <div class="logo">TechStore</div>
        <div class="link">
            <ul>
                <li>Home</li>
                <li>Produtos</li>
            </ul>
        </div>
    </nav>
    <header class="ofertas">
        <h1>As Melhores Ofertas</h1>
    </header>
    <main class="container">
        <div class="grid-produtos">
            <div class="card">
                <img src="https://m.media-amazon.com/images/I/61Da45h7jCL._AC_SX342_SY445_QL70_ML2_.jpg" alt="Produto">
                <h3>Iphone 17 - azul névoa</h3>
                <p>R$ 6.387</p>
                <button class="btn-comprar">Comprar</button>
            </div>
            <div class="card">
                <img src="https://blogdoiphone.com/wp-content/uploads/2026/03/MacBook-Neo-hero-1536x857.jpg" alt="Produto">
                <h3>MacBook Neo</h3>
                <p>R$ 7.300</p>
                <button class="btn-comprar">Comprar</button>
            </div>
        </div>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Receitas da Dona Benta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Receitas da Dona Benta</h1>
  <button id="btn-add">Adicionar Receita</button>
</header>

<main>
  <section id="grid-receitas" class="grid"></section>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-content">

    <h2>Adicionar Receita</h2>
    <label>Nome da Receita</label>
    <input id="nome" placeholder="Digite o nome">
    <label>Tipo</label>
    <input id="tipo" placeholder="DOCE, SALGADA, BEBIDA">
    <label>Ingredientes</label>
    <textarea id="ingredientes"></textarea>
    <label>Modo de Preparo</label>
    <textarea id="modoFazer"></textarea>
    <label>URL da Imagem</label>
    <input id="img">
    <label>Custo Aproximado</label>
    <input id="custo">

    <div class="botoes">
      <button id="salvar">Salvar</button>
      <button id="fechar">Cancelar</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
